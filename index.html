<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
}

canvas {
    display: block;
}

#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    color: white;
    z-index: 10;
}
</style>
</head>

<body>

<div id="ui">
    <div id="coins">Coins: 0</div>
    <div id="distance">0 m</div>
</div>

<canvas id="game"></canvas>

<script>
window.onload = function () {

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// STATE
let gravity = 0.6;
let speed = 5;
let gameOver = false;

let coins = 0;
let distance = 0;

// PLAYER
let bride = {
    x: 80,
    y: 0,
    w: 30,
    h: 30,
    dy: 0,
    grounded: false
};

let ground = 0;

function updateGround(){
    ground = canvas.height - 80;
}

// OBJECTS
let obstacles = [];
let coinList = [];

// INPUT
function jump(){
    if(gameOver){
        restart();
        return;
    }
    if(bride.grounded){
        bride.dy = -12;
        bride.grounded = false;
    }
}

window.addEventListener("click", jump);
window.addEventListener("touchstart", jump);

// SPAWN
setInterval(() => {
    if(gameOver) return;

    obstacles.push({
        x: canvas.width,
        w: 30,
        h: 30,
        type: Math.random() > 0.5 ? "rock" : "pit"
    });

    if(Math.random() > 0.4){
        coinList.push({
            x: canvas.width,
            y: canvas.height - 150,
            r: 6
        });
    }
}, 1200);

// UPDATE
function update(){
    if(gameOver) return;

    updateGround();

    bride.dy += gravity;
    bride.y += bride.dy;

    if(bride.y + bride.h >= ground){
        bride.y = ground - bride.h;
        bride.dy = 0;
        bride.grounded = true;
    }

    obstacles.forEach(o => {
        o.x -= speed;

        if(
            bride.x < o.x + o.w &&
            bride.x + bride.w > o.x &&
            bride.y + bride.h > ground - o.h
        ){
            gameOver = true;
        }
    });

    obstacles = obstacles.filter(o => o.x + o.w > 0);

    coinList.forEach(c => {
        c.x -= speed;

        let dx = bride.x - c.x;
        let dy = bride.y - c.y;

        if(Math.sqrt(dx*dx + dy*dy) < 20){
            coins++;
            c.collected = true;
        }
    });

    coinList = coinList.filter(c => !c.collected && c.x > 0);

    distance += 0.1;

    document.getElementById("coins").innerText = "Coins: " + coins;
    document.getElementById("distance").innerText = Math.floor(distance) + " m";
}

// DRAW
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    updateGround();

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, ground, canvas.width, 2);

    ctx.fillRect(bride.x, bride.y, bride.w, bride.h);

    ctx.fillStyle = "#aaa";
    obstacles.forEach(o => {
        if(o.type === "pit"){
            ctx.clearRect(o.x, ground, o.w, 20);
        } else {
            ctx.fillRect(o.x, ground - o.h, o.w, o.h);
        }
    });

    ctx.fillStyle = "#fff";
    coinList.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
        ctx.fill();
    });

    if(gameOver){
        ctx.fillStyle = "#fff";
        ctx.font = "24px monospace";
        ctx.fillText("GAME OVER", canvas.width/2 - 70, canvas.height/2);
    }
}

// LOOP
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

function restart(){
    gameOver = false;
    coins = 0;
    distance = 0;
    obstacles = [];
    coinList = [];
    bride.y = 0;
    bride.dy = 0;
}

};
</script>

</body>
</html>
